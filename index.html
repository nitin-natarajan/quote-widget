<html>
<head>
    <title>Quote Widget</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
          background-color: #191919;
          padding: 5px;
          height: 100vh;
      }
      #wrap {
          border: 1px solid #121212;
          padding: 4px 6px 5px 6px;
          line-height: 1.5;
          height: 85%;
      }
      #quote {
          font-family: sans-serif;
          font-size: 9.5pt;
          color: #ff5757;
          font-style: italic;
          font-weight: bold;
      }
      #attribution {
          font-family: sans-serif;
          font-size: 8.5pt;
          color: #ff5757;
          font-weight: bold;
          opacity: 0.55;
          margin-top: 1px;
      }
    </style>
</head>
<body>
    <div id="wrap">
        <div id="quote">"time is what we want most, but what we use worst."</div>
        <div id="attribution">— william penn</div>
    </div>
</body>
</html>
